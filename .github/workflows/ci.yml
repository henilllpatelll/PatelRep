name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-api:
    name: Lint / API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: cd apps/api && ruff check .

  lint-web:
    name: Lint + Type-check / Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd apps/web && npm install
      - name: Lint
        run: cd apps/web && npm run lint
      - name: Type-check
        run: cd apps/web && npm run type-check

  build-web:
    name: Build / Web
    runs-on: ubuntu-latest
    needs: lint-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd apps/web && npm install
      - name: Build
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: "https://api-production-130b.up.railway.app"

  test-api:
    name: Test / API
    runs-on: ubuntu-latest
    needs: lint-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: cd apps/api && pip install -r requirements.txt
      - name: Smoke tests
        run: cd apps/api && python -m pytest tests/smoke/ -v --tb=short
        env:
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "test-key"
          SUPABASE_JWT_SECRET: "test-jwt-secret-minimum-32-characters-long!!"
          OPENAI_API_KEY: "test-key"
          ANTHROPIC_API_KEY: "test-key"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "stripe-webhook-secret-test"
          CRON_SECRET: "test-cron-secret"
          APP_ENV: "test"
          APP_URL: "http://localhost:3000"
          API_URL: "http://localhost:8000"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scan Python deps
        run: |
          pip install pip-audit
          cd apps/api && pip-audit -r requirements.txt
        continue-on-error: true
      - name: Install web deps
        run: cd apps/web && npm install
      - name: Scan Node deps
        run: cd apps/web && npm audit --audit-level=high
        continue-on-error: true

  pr-comment:
    name: PR Status
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint-api, lint-web, build-web, test-api, security]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const bot = comments.find(c => c.user.type === 'Bot' && c.body.includes('## CI'));
            const body = [
              '## CI ✅ — All checks passed',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| API lint | ✅ |',
              '| Web lint + type-check | ✅ |',
              '| Web build | ✅ |',
              '| API smoke tests | ✅ |',
              '| Security scan | ✅ |',
            ].join('\n');
            if (bot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: bot.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
