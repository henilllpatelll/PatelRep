name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install ruff
      - name: Lint
        run: cd apps/api && ruff check .

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --workspace=apps/web
      - name: Type check
        run: npm run type-check --workspace=apps/web

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: [lint-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -r requirements.txt
      - name: Run smoke tests
        run: |
          cd apps/api
          python -m pytest tests/smoke/ -v --tb=short
        env:
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "test-key"
          SUPABASE_JWT_SECRET: "test-jwt-secret-minimum-32-characters-long!!"
          OPENAI_API_KEY: "test-key"
          ANTHROPIC_API_KEY: "test-key"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_test_placeholder"
          CRON_SECRET: "test-cron-secret"
          APP_ENV: "test"
          APP_URL: "http://localhost:3000"
          API_URL: "http://localhost:8000"

  # Railway and Vercel deploy via their native GitHub integrations automatically.
  # No GitHub Actions deploy jobs needed — both platforms watch this repo and
  # redeploy on every push to main.
